<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>题目采集测试页</title>
<style>
  body {
    margin: 0;
    font-family: "Microsoft YaHei", Arial, sans-serif;
    background: #f4f6fb;
    color: #1f2937;
  }

  .page {
    display: flex;
    gap: 24px;
    padding: 32px;
  }

  .question-grid {
    width: 360px;
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .grid-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 52px);
    grid-auto-rows: 42px;
    column-gap: 12px;
    row-gap: 12px;
  }

  .qbtn {
    border: none;
    border-radius: 10px;
    background: #e8eefc;
    color: #2453c8;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .qbtn:hover {
    background: #cddcff;
  }

  .qbtn.active {
    background: #2563eb;
    color: white;
  }

  .question-panel {
    flex: 1;
    min-height: 460px;
    background: white;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .question-no {
    color: #2563eb;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .question-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .question-content {
    font-size: 20px;
    line-height: 1.8;
  }

  .options {
    margin-top: 20px;
    display: grid;
    gap: 12px;
  }

  .option {
    padding: 12px 14px;
    background: #f8fafc;
    border: 1px solid #dbe2ef;
    border-radius: 10px;
    font-size: 18px;
  }

  code {
    font-family: Consolas, "Courier New", monospace;
    background: #eef2ff;
    padding: 2px 6px;
    border-radius: 6px;
  }

  .hint {
    margin-top: 24px;
    padding: 12px;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: 10px;
    color: #9a3412;
  }
</style>
</head>
<body>

<div class="page">
  <div class="question-grid">
    <div class="grid-title">题号区</div>
    <div class="buttons" id="buttons"></div>
    <div class="hint">
      测试参数建议：<br>
      rows = 4，cols = 5<br>
      dx ≈ 64，dy ≈ 54<br>
      x0/y0 用你的“获取起点坐标”按钮获取。
    </div>
  </div>

  <div class="question-panel" id="questionPanel">
    <div class="question-no" id="questionNo">第 1 题</div>
    <div class="question-title" id="questionTitle">测试题目</div>
    <div class="question-content" id="questionContent"></div>
    <div class="options" id="options"></div>
  </div>
</div>

<script>
const questions = [
  {
    title: "比较运算符测试",
    content: "已知 x > 3 且 y ≤ 5，下列说法正确的是哪一项？请注意符号 >、<、≥、≤ 的识别。",
    options: ["A. x < 3", "B. x > 3", "C. y ≥ 6", "D. x = y"]
  },
  {
    title: "Python 代码识别测试",
    content: "请识别下面代码：from PySide6.QtWidgets import QApplication；from ui.main_window import MainWindow。",
    options: ["A. QApplication 是类名", "B. main_window 不是模块", "C. PySide6 是变量", "D. import 不能使用"]
  },
  {
    title: "概率公式测试",
    content: "设随机变量 X ~ N(0,1)，求 P(X ≥ 1.96) 的含义。",
    options: ["A. 左尾概率", "B. 右尾概率", "C. 条件概率", "D. 联合概率"]
  },
  {
    title: "集合符号测试",
    content: "若 A ⊆ B，且 x ∈ A，则一定有 x ∈ B。判断该命题是否正确。",
    options: ["A. 正确", "B. 错误", "C. 无法判断", "D. 与 A 无关"]
  },
  {
    title: "函数表达式测试",
    content: "函数 f(x)=x²+2x+1 可以写成 f(x)=(x+1)²。",
    options: ["A. 正确", "B. 错误", "C. 只在 x>0 时正确", "D. 只在 x<0 时正确"]
  },
  {
    title: "数据库 SQL 测试",
    content: "SQL 语句：SELECT * FROM Student WHERE score >= 60 AND name LIKE '张%';",
    options: ["A. 查询及格学生", "B. 删除学生", "C. 修改成绩", "D. 创建表"]
  },
  {
    title: "网络地址测试",
    content: "IPv4 地址 192.168.1.1/24 中，/24 表示子网掩码长度。",
    options: ["A. 正确", "B. 错误", "C. 表示端口号", "D. 表示协议号"]
  },
  {
    title: "数学建模变量测试",
    content: "设 U_i = 0.314P_i + 0.380L_i + 0.103Q_i^*，其中 Q_i^* 为标准化体质风险。",
    options: ["A. U_i 是综合风险", "B. P_i 是成本", "C. L_i 是年龄", "D. Q_i^* 是血糖"]
  },
  {
    title: "逻辑判断测试",
    content: "若 p → q 为假，则 p 为真且 q 为假。",
    options: ["A. 正确", "B. 错误", "C. p 必为假", "D. q 必为真"]
  },
  {
    title: "程序路径测试",
    content: "文件路径 C:\\Users\\zzx05\\Desktop\\工具\\main.py 中包含反斜杠和中文目录。",
    options: ["A. 是 Windows 路径", "B. 是 Linux 路径", "C. 是 URL", "D. 是 SQL"]
  },
  {
    title: "英文大小写测试",
    content: "MainWindow、mainwindow、main_window 三者在代码中通常不是完全等价的。",
    options: ["A. 正确", "B. 错误", "C. 永远等价", "D. 都不是标识符"]
  },
  {
    title: "不等式测试",
    content: "若 a < b 且 b < c，则 a < c。该结论称为不等式的传递性。",
    options: ["A. 正确", "B. 错误", "C. 只有整数成立", "D. 只有负数成立"]
  },
  {
    title: "HTML 标签测试",
    content: "HTML 中 <div> 表示块级容器，<span> 通常表示行内容器。",
    options: ["A. 正确", "B. 错误", "C. div 是图片", "D. span 是表格"]
  },
  {
    title: "极限符号测试",
    content: "lim_{x→0} sin(x)/x = 1 是一个常见重要极限。",
    options: ["A. 正确", "B. 错误", "C. 等于 0", "D. 不存在"]
  },
  {
    title: "数组下标测试",
    content: "在 Python 中，list[0] 表示列表的第一个元素，list[-1] 表示最后一个元素。",
    options: ["A. 正确", "B. 错误", "C. -1 会报错", "D. 0 表示最后一个"]
  },
  {
    title: "综合测试",
    content: "请识别符号组合：a_b、x≥0、P(X≤k)、user_id、A->B、C++、F1-score。",
    options: ["A. 用于测试 OCR", "B. 用于提交答案", "C. 用于删除记录", "D. 用于关闭网页"]
  },
  {
    title: "文本长题测试",
    content: "某系统需要定时采集网页中的题目信息，要求每次点击题号后等待页面刷新，再截图题目区域并保存识别文字。",
    options: ["A. 应等待页面刷新", "B. 不需要截图", "C. 不需要保存", "D. 必须自动答题"]
  },
  {
    title: "分数测试",
    content: "若正确率 accuracy = 正确数量 / 总数量，则当正确数量为 80、总数量为 100 时，accuracy = 0.8。",
    options: ["A. 0.8", "B. 8", "C. 80", "D. 100"]
  },
  {
    title: "坐标测试",
    content: "第 r 行第 c 列的点击坐标可表示为 x=x0+c×dx，y=y0+r×dy。",
    options: ["A. 正确", "B. 错误", "C. 与 dx 无关", "D. 与 dy 无关"]
  },
  {
    title: "最后一题",
    content: "这是第 20 题，用于测试采集流程是否能从第 1 题顺利采集到第 20 题。",
    options: ["A. 完成测试", "B. 重新开始", "C. 停止网页", "D. 提交答案"]
  }
];

const buttons = document.getElementById("buttons");

for (let i = 0; i < questions.length; i++) {
  const btn = document.createElement("button");
  btn.className = "qbtn";
  btn.textContent = i + 1;
  btn.onclick = () => showQuestion(i);
  buttons.appendChild(btn);
}

function showQuestion(index) {
  document.querySelectorAll(".qbtn").forEach(btn => btn.classList.remove("active"));
  document.querySelectorAll(".qbtn")[index].classList.add("active");

  const q = questions[index];
  document.getElementById("questionNo").textContent = `第 ${index + 1} 题`;
  document.getElementById("questionTitle").textContent = q.title;
  document.getElementById("questionContent").textContent = q.content;

  const options = document.getElementById("options");
  options.innerHTML = "";
  q.options.forEach(opt => {
    const div = document.createElement("div");
    div.className = "option";
    div.textContent = opt;
    options.appendChild(div);
  });
}

showQuestion(0);
</script>

</body>
</html>
